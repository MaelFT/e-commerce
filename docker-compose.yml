services:
  app:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: ecommerce-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./back:/var/www/html
      - back-vendor:/var/www/html/vendor
      - back-storage:/var/www/html/storage
      - back-cache:/var/www/html/bootstrap/cache
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ecommerce
      DB_USERNAME: postgres
      DB_PASSWORD: password
      FRONTEND_URL: http://localhost:5173
    command: >
      sh -lc "
        if [ ! -f /var/www/html/.env ]; then cp /var/www/html/.env.example /var/www/html/.env; fi;
        if [ ! -f /var/www/html/vendor/autoload.php ]; then composer install --no-interaction --optimize-autoloader; fi;
        php-fpm
      "
    networks:
      - ecommerce-network
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    container_name: ecommerce-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./back:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - ecommerce-network
    depends_on:
      - app

  front:
    image: node:20-alpine
    container_name: ecommerce-front
    working_dir: /app
    restart: unless-stopped
    environment:
      VITE_PROXY_TARGET: http://nginx:80
    volumes:
      - ./front:/app
      - front-node-modules:/app/node_modules
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    networks:
      - ecommerce-network
    depends_on:
      - nginx

  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - ecommerce-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  ecommerce-network:
    driver: bridge

volumes:
  postgres-data:
  back-vendor:
  back-storage:
  back-cache:
  front-node-modules:
